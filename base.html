<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}OEShare{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<nav class="navbar">
    <a href="/" class="brand">
        <span class="brand-icon">⬡</span>
        <span class="brand-name">OEShare</span>
    </a>
    <div class="nav-links">
        <a href="/send/file" class="nav-link">Send File</a>
        <a href="/send/text" class="nav-link">Send Text</a>
        <a href="/receive" class="nav-link nav-cta">Receive</a>
    </div>
</nav>

<main class="main-content">
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="flash flash-{{ category }}">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
</main>

<footer class="footer">
    <p>OEShare &mdash; Files expire after <strong>24 hours</strong>.</p>
</footer>

<script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
